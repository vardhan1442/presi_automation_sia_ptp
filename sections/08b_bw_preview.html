<div class="two-col">
  <div class="table-card">
    <div class="section-title">
      IDI BW Sample Preview
      <span class="pill" id="idiPreviewCountPill">0 rows</span>
    </div>
    <div class="subtle" style="margin-bottom:10px;">Shows up to 200 visible samples. Zoom the IDI chart to narrow the preview.</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th id="idiPreviewXHeader">Time</th>
            <th>Read BW</th>
            <th>Write BW</th>
          </tr>
        </thead>
        <tbody id="idiPreviewBody"></tbody>
      </table>
    </div>
  </div>

  <div class="table-card">
    <div class="section-title">
      DDR BW Sample Preview
      <span class="pill" id="ddrPreviewCountPill">0 rows</span>
    </div>
    <div class="subtle" style="margin-bottom:10px;">Shows up to 200 visible samples. Zoom the DDR chart to narrow the preview.</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Time</th>
            <th>Read BW</th>
            <th>Write BW</th>
          </tr>
        </thead>
        <tbody id="ddrPreviewBody"></tbody>
      </table>
    </div>
  </div>
</div>
