<div class="meta-grid">
  <div class="card"><div class="stat-title">Run Directory</div><div class="stat-value" id="runDirValue"></div></div>
  <div class="card"><div class="stat-title">Run Name</div><div class="stat-value" id="runNameValue"></div></div>
  <div class="card"><div class="stat-title">Generated At</div><div class="stat-value" id="generatedAtValue"></div></div>
  <div class="card"><div class="stat-title">IDI Source</div><div class="stat-value" id="graph1SourceValue"></div></div>
  <div class="card"><div class="stat-title">DDR Source</div><div class="stat-value" id="graph2SourceValue"></div></div>
  <div class="card"><div class="stat-title">Loop Count</div><div class="stat-value" id="loopCountValue"></div></div>
</div>

<div class="panel">
  <div class="section-title">Run Summary / Metadata</div>
  <div class="stats-grid">
    <div class="card"><div class="stat-title">Test Start IDI</div><div class="stat-value" id="testStartId">-</div></div>
    <div class="card"><div class="stat-title">Test End IDI</div><div class="stat-value" id="testEndId">-</div></div>
    <div class="card"><div class="stat-title">Test Start DDR</div><div class="stat-value" id="testStartDdr">-</div></div>
    <div class="card"><div class="stat-title">Test End DDR</div><div class="stat-value" id="testEndDdr">-</div></div>
    <div class="card"><div class="stat-title">Threads</div><div class="stat-value" id="threadsValue">-</div></div>
    <div class="card"><div class="stat-title">Cores</div><div class="stat-value" id="coresValue">-</div></div>
  </div>

  <div class="two-col" style="margin-top:16px;">
    <div>
      <div class="subtle">Command Line</div>
      <div class="kv-block" id="cmdLineBlock">-</div>
    </div>
    <div>
      <div class="subtle">Run Model / kind_model</div>
      <div class="kv-block" id="runModelBlock">-</div>
    </div>
  </div>
</div>
